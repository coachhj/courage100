<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

    <script>
        // 100개의 인정·지지·격려·응원 표현 데이터베이스

            { id: 1, text: "많이 배웠습니다." }, { id: 2, text: "존경합니다." }, { id: 3, text: "진심으로 감사합니다." }, { id: 4, text: "정말 탁월하시네요." }, { id: 5, text: "영광입니다." },
            { id: 6, text: "의지가 정말 강하시네요." }, { id: 7, text: "감동입니다." }, { id: 8, text: "특별한 분이십니다." }, { id: 9, text: "모범이 되시네요." }, { id: 10, text: "마음 깊이 존경을 표합니다." },
            { id: 11, text: "축하합니다." }, { id: 12, text: "당신은 정말 소중한 사람입니다." }, { id: 13, text: "진정한 영웅이세요." }, { id: 14, text: "멋진 일을 하시네요." }, { id: 15, text: "덕분에 힘이 납니다." },
            { id: 16, text: "덕분에 좋은 생각이 났어요." }, { id: 17, text: "어떻게 그렇게 잘할 수 있어요?" }, { id: 18, text: "정말 놀랍습니다." }, { id: 19, text: "당신이 자랑스럽습니다." }, { id: 20, text: "훌륭한 리더이십니다." },
            { id: 21, text: "소통의 대가시네요." }, { id: 22, text: "꾸준히 성장하고 계시군요." }, { id: 23, text: "배려하는 분이세요." }, { id: 24, text: "의미있는 일을 하시네요." }, { id: 25, text: "좋은 영향을 주시네요." },
            { id: 26, text: "참 유능한 분이세요." }, { id: 27, text: "덕분에 기분이 좋아져요." }, { id: 28, text: "큰 기여를 해주고 계십니다." }, { id: 29, text: "더욱 기대가 됩니다." }, { id: 30, text: "참 재미있어요." },
            { id: 31, text: "응원하고 있습니다." }, { id: 32, text: "당신은 꼭 필요한 존재입니다." }, { id: 33, text: "당신을 믿습니다." }, { id: 34, text: "도움이 됐습니다." }, { id: 35, text: "함께 있고 싶어요." },
            { id: 36, text: "덕분에 행복합니다." }, { id: 37, text: "함께 계셔서 든든합니다." }, { id: 38, text: "중요한 분이십니다." }, { id: 39, text: "마음에 새기겠습니다." }, { id: 40, text: "곁에 있으면 편안해져요." },
            { id: 41, text: "친해지고 싶어요." }, { id: 42, text: "미안합니다." }, { id: 43, text: "제가 부족했습니다." }, { id: 44, text: "본받고 싶습니다." }, { id: 45, text: "지금 이대로도 충분히 훌륭해요." },
            { id: 46, text: "성품이 좋으세요." }, { id: 47, text: "걱정한다고 걱정이 없어지면 걱정할 일이 없겠죠." }, { id: 48, text: "이미 잘하고 있어요." }, { id: 49, text: "정말 최고입니다." }, { id: 50, text: "지금 이 순간을 즐기세요." },
            { id: 51, text: "이 또한 지나갈 거예요." }, { id: 52, text: "되돌아보면 극복하지 못한 일은 없었어요." }, { id: 53, text: "지금까지 잘해 왔어요." }, { id: 54, text: "참 다행이에요." }, { id: 55, text: "지금 같이만 해주세요." },
            { id: 56, text: "너무 무리하지 마세요." }, { id: 57, text: "언제나 당신 편이에요." }, { id: 58, text: "당신 덕분입니다." }, { id: 59, text: "당신 탓이 아니에요." }, { id: 60, text: "참 사랑스럽습니다." },
            { id: 61, text: "당신이라면 이겨낼 수 있어요." }, { id: 62, text: "더 자신을 믿어도 좋아요." }, { id: 63, text: "당신이라 좋습니다." }, { id: 64, text: "덕분에 힘을 얻습니다." }, { id: 65, text: "충분히 잘하고 있어요." },
            { id: 66, text: "지금 모습 그대로 아름답습니다." }, { id: 67, text: "곁에서 지켜줄게요." }, { id: 68, text: "오래도록 함께해요." }, { id: 69, text: "열심히 노력하고 계시네요." }, { id: 70, text: "정말 애쓰셨습니다." },
            { id: 71, text: "모든 일에 의미가 있다고 믿습니다." }, { id: 72, text: "정말 대단하세요." }, { id: 73, text: "힘들다고 말해도 괜찮아요." }, { id: 74, text: "당신은 나의 기쁨입니다." }, { id: 75, text: "그저 존재만으로 힘이 되는 사람입니다." },
            { id: 76, text: "당신은 참 좋은 사람입니다." }, { id: 77, text: "항상 진심이 느껴집니다." }, { id: 78, text: "당신의 노력을 알고 있습니다." }, { id: 79, text: "늘 한결같으시네요." }, { id: 80, text: "그 마음이 참 고맙습니다." },
            { id: 81, text: "한결같은 모습이 좋습니다." }, { id: 82, text: "매번 배울 점이 많아요." }, { id: 83, text: "묵묵히 애써 주셔서 감사합니다." }, { id: 84, text: "작은 것도 놓치지 않으시네요." }, { id: 85, text: "늘 든든한 버팀목이세요." },
            { id: 86, text: "당신의 진심이 전해집니다." }, { id: 87, text: "그 열정이 참 멋집니다." }, { id: 88, text: "늘 곁에서 응원할게요." }, { id: 89, text: "당신의 선택을 지지합니다." }, { id: 90, text: "끝까지 해내실 거예요." },
            { id: 91, text: "그 마음 잊지 않겠습니다." }, { id: 92, text: "당신의 시간이 헛되지 않을 거예요." }, { id: 93, text: "천천히 가도 괜찮아요." }, { id: 94, text: "충분히 애쓰고 계세요." }, { id: 95, text: "당신의 진심을 압니다." },
            { id: 96, text: "늘 응원하는 사람이 있다는 걸 기억해요." }, { id: 97, text: "함께해서 든든했습니다." }, { id: 98, text: "당신은 이미 충분히 빛나고 있어요." }, { id: 99, text: "늘 한 걸음씩 나아가고 있어요." }, { id: 100, text: "당신과 함께해서 좋았습니다." }
        ];

        var TOTAL = 100;
        var stepIdx = 1;
        var currentRoundPhrases = [];
        var isSetFinished = false;

        function shuffleArray(arr) {
            var a = arr.slice();
            for (var i = a.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
            }
            return a;
        }

        function copyCurrentPhrase() {
            var btnCopy = document.getElementById('btn-copy');
            if (btnCopy.disabled) return;

            var text = document.getElementById('question-content').innerText;

            function showCopiedFeedback() {
                var original = btnCopy.innerText;
                btnCopy.innerText = "복사됨!";
                setTimeout(function() {
                    btnCopy.innerText = original;
                }, 1200);
            }

            function fallbackCopy() {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                ta.style.top = '0';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                try {
                    document.execCommand('copy');
                    showCopiedFeedback();
                } catch (e) {
                    btnCopy.innerText = "복사 실패";
                    setTimeout(function() { btnCopy.innerText = "문장 복사"; }, 1200);
                }
                document.body.removeChild(ta);
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(showCopiedFeedback).catch(fallbackCopy);
            } else {
                fallbackCopy();
            }
        }

        function startApp() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            isSetFinished = false;

            setTimeout(function() {
                buildPhraseSet();
            }, 50);
        }

        function goHome() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            stepIdx = 1;
            isSetFinished = false;
        }

        function buildPhraseSet() {
            currentRoundPhrases = shuffleArray(phrases);
            stepIdx = 1;
            renderPhraseDisplay();
        }

        function handlePrev() {
            if (isSetFinished) return;
            if (stepIdx > 1) {
                stepIdx--;
                renderPhraseDisplay();
            }
        }

        function handleNext() {
            if (isSetFinished) {
                goHome();
                return;
            }

            if (stepIdx < TOTAL) {
                stepIdx++;
                renderPhraseDisplay();
            } else {
                renderFinishScreen();
            }
        }

        function renderFinishScreen() {
            isSetFinished = true;

            var txtBox = document.getElementById('question-content');
            var btnNext = document.getElementById('btn-next');
            var btnPrev = document.getElementById('btn-prev');
            var btnCopy = document.getElementById('btn-copy');
            var fillBar = document.getElementById('step-fill');
            var lblStep = document.getElementById('step-label');

            txtBox.innerText = "100개의 표현을 모두 만나보셨습니다.\n오늘도 많이 응원할게요!";
            lblStep.innerText = "완료!";
            fillBar.style.width = "100%";

            btnNext.innerText = "처음부터";
            btnNext.disabled = false;
            btnPrev.disabled = true;
            btnCopy.disabled = true;
        }

        function renderPhraseDisplay() {
            var txtBox = document.getElementById('question-content');
            var lblStep = document.getElementById('step-label');
            var fillBar = document.getElementById('step-fill');
            var btnNext = document.getElementById('btn-next');
            var btnPrev = document.getElementById('btn-prev');
            var btnCopy = document.getElementById('btn-copy');

            btnNext.disabled = true;
            btnPrev.disabled = true;
            btnCopy.disabled = true;
            lblStep.innerText = stepIdx + "/" + TOTAL;
            fillBar.style.width = ((stepIdx / TOTAL) * 100) + "%";
            btnNext.innerText = "다음";

            var targetText = currentRoundPhrases[stepIdx - 1].text;

            var msElapsed = 0;
            var loopInterval = setInterval(function() {
                var rand = Math.floor(Math.random() * phrases.length);
                txtBox.innerText = phrases[rand].text;
                msElapsed += 50;

                if (msElapsed >= 400) {
                    clearInterval(loopInterval);
                    txtBox.innerText = targetText;
                    btnNext.disabled = false;
                    btnCopy.disabled = false;
                    btnPrev.disabled = (stepIdx === 1);
                }
            }, 50);
        }
    </script>

    <style>
        :root {
            --bg-color: #DCF2E3;
            --card-bg: #F2FAF4;
            --text-main: #333333;
            --accent-color: #43A047;
            --secondary-color: #82A893;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        #app-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        #app-footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: var(--secondary-color);
            z-index: 10;
            pointer-events: none;
            opacity: 0.7;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 24px 35px 24px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        #home-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-img {
            width: 160px;
            height: 160px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        .welcome-text {
            font-size: 31px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 35px;
            letter-spacing: -0.5px;
        }

        .header { width: 100%; margin-bottom: 10px; }

        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .progress-label {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-color);
            font-family: 'Poppins', sans-serif;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background-color: rgba(0,0,0,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .question-display {
            width: 100%;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: var(--card-bg);
            border-radius: 30px;
            box-shadow: var(--shadow);
            margin-top: 10px;
            margin-bottom: 25px;
            min-height: 0;
            font-size: 28px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: auto;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-prev {
            flex: 0 0 35%;
            background-color: #FFFFFF;
            color: var(--secondary-color);
            border: 2px solid var(--secondary-color);
            box-shadow: none;
        }

        .btn-prev:active { transform: scale(0.97); }
        .btn-prev:disabled { color: #ccc; border-color: #e5e5e5; cursor: not-allowed; }

        .nav-row .btn-main {
            flex: 1;
        }

        .btn-main {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 6px 15px rgba(67, 160, 71, 0.25);
        }

        .btn-main:active { transform: scale(0.97); }
        .btn-main:disabled { background-color: #ddd; box-shadow: none; cursor: not-allowed; }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .btn-home {
            background-color: transparent;
            color: var(--secondary-color);
            font-size: 19px;
            text-decoration: underline;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
        }

        .btn-copy {
            background-color: transparent;
            color: var(--accent-color);
            font-size: 19px;
            font-weight: 700;
            text-decoration: underline;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
        }

        .btn-copy:disabled {
            color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="home-screen" class="screen">
        <div></div>
        <div>
            <img src="encourage.png" alt="당신을 인정 지지 격려 응원합니다" class="hero-img">
            <h1 class="welcome-text">당신을 인정 지지 격려 응원합니다!</h1>
        </div>
        <button class="btn btn-main" id="btn-start" onclick="startApp();">시작하기</button>
    </div>

    <div id="question-screen" class="screen hidden">
        <div class="header">
            <div class="progress-container">
                <span class="progress-label" id="step-label">1/100</span>
                <div class="progress-track"><div class="progress-fill" id="step-fill"></div></div>
            </div>
        </div>

        <div class="question-display">
            <div id="question-content">마음을 전할 준비가 되셨나요?</div>
        </div>

        <div class="button-group">
            <div class="nav-row">
                <button class="btn btn-prev" id="btn-prev" onclick="handlePrev();" disabled>이전으로</button>
                <button class="btn btn-main" id="btn-next" onclick="handleNext();">다음</button>
            </div>
            <div class="bottom-row">
                <button class="btn-home" onclick="goHome();">HOME</button>
                <button class="btn-copy" id="btn-copy" onclick="copyCurrentPhrase();">문장 복사</button>
            </div>
        </div>
    </div>

    <div id="app-footer">© Dr. Hannjoo Lee, KSC/PCC · hannjoo@gmail.com</div>
</div>

</body>
</html>
